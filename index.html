<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Amigo IA — Tu compañero que te recuerda</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">AI</div>
        <div>
          <h1>Amigo IA</h1>
          <p>Tu compañero cálido, útil y humano.</p>
        </div>
      </div>

      <div class="actions">
        <span id="status" class="pill">Invitado (sin memoria)</span>
        <button id="btnLogin" class="btn" type="button">Iniciar sesión</button>
        <button id="btnLogout" class="btn ghost hidden" type="button">Salir</button>
      </div>
    </header>

    <main class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="side-top">
          <button id="btnNewChat" class="btn primary full" type="button">+ Nuevo chat</button>

          <div class="search">
            <input id="chatSearch" type="text" placeholder="Buscar chats…" />
          </div>
        </div>

        <div id="chatList" class="chat-list">
          <!-- items -->
        </div>

        <div class="side-bottom">
          <button id="btnClear" class="btn ghost full" type="button">Borrar chat (local)</button>
          <button id="btnDeleteCloud" class="btn danger full hidden" type="button">Borrar chats guardados</button>
          <p class="hint" id="hint">Modo invitado: al cerrar, no se guarda.</p>
        </div>
      </aside>

      <!-- Chat Area -->
      <section class="chat-area">
        <div class="chat-header">
          <div class="chat-title">
            <span class="dot"></span>
            <div>
              <div id="openChatTitle" class="title">Chat principal</div>
              <div id="openChatSub" class="sub">Escribe y presiona Enter</div>
            </div>
          </div>

          <div class="chat-header-actions">
            <button id="btnExport" class="btn ghost" type="button">Exportar</button>
          </div>
        </div>

        <div id="chat" class="chat"></div>

        <div class="composer">
          <textarea id="msg" rows="1" placeholder="Escribe aquí… (Enter = enviar, Shift+Enter = salto)"></textarea>
          <button id="send" class="btn primary" type="button">Enviar</button>
        </div>
      </section>
    </main>

    <!-- Modal Login -->
    <div id="modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <h2>Iniciar sesión</h2>
          <button id="closeModalX" class="x" type="button">✕</button>
        </div>

        <p class="muted">Con cuenta, tu IA te recuerda y guarda tu historial.</p>

        <label class="lab">Email</label>
        <input id="email" type="email" placeholder="tucorreo@gmail.com" />

        <label class="lab">Contraseña</label>
        <input id="pass" type="password" placeholder="••••••••" />

        <div class="row">
          <button id="doLogin" class="btn primary" type="button">Entrar</button>
          <button id="doSignup" class="btn" type="button">Crear cuenta</button>
          <button id="closeModal" class="btn ghost" type="button">Cerrar</button>
        </div>

        <p class="muted small">
          Al usar la app aceptas la <a href="/privacy.html" target="_blank">Política de Privacidad</a> y
          <a href="/terms.html" target="_blank">Términos</a>.
        </p>

        <p id="authErr" class="err"></p>
      </div>
    </div>
  </div>

  <!-- Supabase (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App -->
  <script type="module" src="/app.js" defer></script>
</body>
</html>
