<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neura — App</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body class="app-page">
  <!-- ✅ ENCAPSULADOR: esto evita que el CSS de app afecte al landing -->
  <div class="neura-shell sb-shell" id="shell">

    <aside class="sidebar" id="sidebar" aria-label="Chats">
      <div class="side-top">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="logo sm">N</div>
          <div>
            <div style="font-weight:900;">Neura</div>
            <div class="muted tiny">La IA que aprende de ti.</div>
          </div>
        </div>

        <button class="btn primary full" id="btnNewChat" type="button" style="margin-top:10px;">+ Nuevo chat</button>

        <div class="search">
          <input id="chatSearch" type="text" placeholder="Buscar chats…" />
        </div>
      </div>

      <!-- ✅ Lista con scroll propio -->
      <div id="chatList" class="chat-list"></div>

      <div class="side-bottom">
        <span id="status" class="pill">Invitado (sin memoria)</span>

        <div class="row" style="margin-top:10px;">
          <button id="btnLogin" class="btn" type="button">Iniciar sesión</button>
          <button id="btnLogout" class="btn ghost hidden" type="button">Salir</button>
        </div>

        <div class="row" style="margin-top:10px;">
          <button id="btnExport" class="btn ghost" type="button">Exportar</button>
          <button id="btnClear" class="btn ghost" type="button">Borrar chat (local)</button>
        </div>

        <button id="btnDeleteCloud" class="btn danger hidden" type="button" style="margin-top:10px;width:100%">
          Borrar chats guardados
        </button>

        <p class="hint" id="hint">Modo invitado: al cerrar, no se guarda.</p>
      </div>
    </aside>

    <!-- ✅ Overlay móvil -->
    <div class="overlay hidden" id="overlay" aria-hidden="true"></div>

    <main class="chat-area" id="chatArea" aria-label="Chat">
      <div class="chat-header">
        <!-- ✅ Menú móvil tipo ChatGPT -->
        <button class="icon-btn" id="btnToggleSidebar" type="button" aria-label="Menú">☰</button>

        <div class="chat-title">
          <span class="dot"></span>
          <div>
            <div id="openChatTitle" class="title">Chat principal</div>
            <div id="openChatSub" class="sub">Escribe y presiona Enter</div>
          </div>
        </div>

        <span class="pill">Neura</span>
      </div>

      <div id="chat" class="chat"></div>

      <div class="composer">
        <textarea id="msg" rows="1" placeholder="Escribe aquí… (Enter = enviar, Shift+Enter = salto)"></textarea>
        <button id="send" class="btn primary" type="button">Enviar</button>
      </div>
    </main>

    <!-- Modal Login -->
    <div id="modal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-head">
          <h2 style="margin:0;">Iniciar sesión</h2>
          <button id="closeModalX" class="x" type="button" aria-label="Cerrar">✕</button>
        </div>

        <p class="muted">Con cuenta, tu IA te recuerda y guarda tu historial.</p>

        <label class="lab">Email</label>
        <input id="email" type="email" placeholder="tucorreo@gmail.com" />

        <label class="lab">Contraseña</label>
        <input id="pass" type="password" placeholder="••••••••" />

        <div class="row">
          <button id="doLogin" class="btn primary" type="button">Entrar</button>
          <button id="doSignup" class="btn" type="button">Crear cuenta</button>
          <button id="closeModal" class="btn ghost" type="button">Cerrar</button>
        </div>

        <p id="authErr" class="err"></p>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./app.js"></script>

  <!-- ✅ Script mini: menú móvil tipo ChatGPT (sb-open) -->
  <script>
    (function(){
      const shell = document.getElementById("shell");
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      const btn = document.getElementById("btnToggleSidebar");

      function open(){
        sidebar.classList.add("sidebar-open");
        overlay.classList.remove("hidden");
        overlay.setAttribute("aria-hidden","false");
      }
      function close(){
        sidebar.classList.remove("sidebar-open");
        overlay.classList.add("hidden");
        overlay.setAttribute("aria-hidden","true");
      }

      btn && btn.addEventListener("click", () => {
        if (sidebar.classList.contains("sidebar-open")) close();
        else open();
      });

      overlay && overlay.addEventListener("click", close);

      window.addEventListener("resize", () => {
        if (window.innerWidth > 900) close();
      });
    })();
  </script>
</body>
</html>
