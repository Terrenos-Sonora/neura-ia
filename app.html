<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neura — App</title>

  <!-- ✅ usa el CSS nuevo -->
  <link rel="stylesheet" href="/styles.css" />
</head>

<!-- ✅ IMPORTANTÍSIMO para tu fix de scroll PC -->
<body class="app-page">
  <div class="app">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="brand mini">
        <div class="logo sm">N</div>
        <div>
          <h1>Neura</h1>
          <p>La IA que aprende de ti.</p>
        </div>
      </div>

      <div class="actions">
        <span id="status" class="pill">Invitado (sin memoria)</span>
        <button id="btnLogin" class="btn" type="button">Iniciar sesión</button>
        <button id="btnLogout" class="btn ghost hidden" type="button">Salir</button>
      </div>
    </header>

    <!-- LAYOUT -->
    <section class="layout">

      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar" aria-label="Chats">
        <div class="side-top">
          <button class="btn primary full" id="btnNewChat" type="button">+ Nuevo chat</button>

          <div class="search">
            <input id="chatSearch" type="text" placeholder="Buscar chats…" />
          </div>
        </div>

        <!-- ✅ Scroll propio -->
        <div id="chatList" class="chat-list" role="list"></div>

        <div class="side-bottom">
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button id="btnExport" class="btn ghost" type="button">Exportar</button>
            <a class="btn ghost" href="/index.html">Inicio</a>
          </div>

          <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
            <button id="btnClear" class="btn ghost" type="button">Borrar chat (local)</button>
            <button id="btnDeleteCloud" class="btn danger hidden" type="button">Borrar chats guardados</button>
          </div>

          <p class="hint" id="hint">Modo invitado: al cerrar, no se guarda.</p>
        </div>
      </aside>

      <!-- OVERLAY móvil -->
      <div class="overlay hidden" id="overlay" aria-hidden="true"></div>

      <!-- CHAT AREA -->
      <main class="chat-area" id="chatArea" aria-label="Chat">
        <div class="chat-header">
          <!-- ✅ ESTE ES EL HAMBURGUESA REAL QUE TU app.js USA -->
          <button class="icon-btn" id="btnToggleSidebar" type="button" aria-label="Menú">☰</button>

          <div class="chat-title">
            <span class="dot"></span>
            <div>
              <div id="openChatTitle" class="title">Chat principal</div>
              <div id="openChatSub" class="sub">Escribe y presiona Enter</div>
            </div>
          </div>

          <div class="actions">
            <span class="pill">Neura</span>
          </div>
        </div>

        <!-- ✅ Scroll propio del chat -->
        <div id="chat" class="chat"></div>

        <div class="composer">
          <textarea id="msg" rows="1" placeholder="Escribe aquí… (Enter = enviar, Shift+Enter = salto)"></textarea>
          <button id="send" class="btn primary" type="button">Enviar</button>
        </div>
      </main>
    </section>

    <!-- MODAL LOGIN -->
    <div id="modal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-head">
          <h2 style="margin:0;">Iniciar sesión</h2>
          <button id="closeModalX" class="x" type="button" aria-label="Cerrar">✕</button>
        </div>

        <p class="muted">Con cuenta, tu IA te recuerda y guarda tu historial.</p>

        <label class="lab">Email</label>
        <input id="email" type="email" placeholder="tucorreo@gmail.com" />

        <label class="lab">Contraseña</label>
        <input id="pass" type="password" placeholder="••••••••" />

        <div class="row">
          <button id="doLogin" class="btn primary" type="button">Entrar</button>
          <button id="doSignup" class="btn" type="button">Crear cuenta</button>
          <button id="closeModal" class="btn ghost" type="button">Cerrar</button>
        </div>

        <p class="muted small">
          Al usar la app aceptas la <a href="/privacy.html" target="_blank">Política de Privacidad</a> y
          <a href="/terms.html" target="_blank">Términos</a>.
        </p>

        <p id="authErr" class="err"></p>
      </div>
    </div>

  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Tu app -->
  <script type="module" src="/app.js"></script>
</body>
</html>
